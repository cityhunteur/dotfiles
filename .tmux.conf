# No bells at all
set -g bell-action none

# Change the prefix key to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# macOS clipboard support
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Reload tmux config without relying on tmux-sensible's run-shell wrapper.
bind-key R source-file ~/.tmux.conf \; display-message "Sourced ~/.tmux.conf!"

# Turn the mouse on with copy mode support
set -g mouse on
setw -g mode-keys vi

set -g @continuum-restore 'on'
set -g @resurrect-dir '$HOME/.local/share/tmux/resurrect'

# Plugins (load before custom status to let tpm work, but override status after)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
run -b '~/.tmux/plugins/tpm/tpm'

# =============================================================================
# Nord Status Bar (adapts to terminal light/dark via named colors)
# =============================================================================
# Uses terminal color names so it follows the Ghostty Nord/Nord Light theme.
# Terminal color mapping (Nord):
#   black = Polar Night 1, brightblack = Polar Night 4
#   white = Snow Storm 2,  brightwhite = Snow Storm 3
#   blue  = Frost 3,       brightblue  = Frost 4
#   cyan  = Frost 2,       brightcyan  = Frost 1
#   green = Aurora green,   yellow = Aurora yellow, red = Aurora red

set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=default,fg=white"

# Redraw the status line immediately when focus changes.
set-hook -g after-select-pane 'refresh-client -S'
set-hook -g after-select-window 'refresh-client -S'

set -g status-left-length 60
set -g status-right-length 120

# Left: session name
set -g status-left "#[fg=brightblack]┌ #[fg=blue,bold]⟪ #S ⟫#[fg=brightblack,nobold]  "

# Right: active pane git branch, host, and time.
# Include pane_id in the shell command so tmux refreshes the branch when focus
# moves between panes instead of reusing a cached result.
set -g status-right "#(/Users/pravin/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#[fg=brightblack]─── #[fg=brightblack]⟨  #[fg=white]#(test -n '#{pane_id}' && git -C '#{pane_current_path}' branch --show-current 2>/dev/null)#[fg=brightblack] ⟩ #[fg=brightblack]─── #[fg=cyan]⟨ #H ⟩ #[fg=default]⟨ %H:%M ⟩"

# Window status (adapts inactive/active contrast to macOS dark/light mode)
set -g window-status-separator ""
set -g window-status-style "bg=default,fg=default,noreverse"
set -g window-status-current-style "bg=default,fg=default,noreverse"
# Default to light mode colors
set -g window-status-format "    #[fg=white]#I #W"
set -g window-status-current-format "    #[fg=cyan,bold]#I #[fg=black,bold]#W"
# Override with dark mode colors if macOS dark mode is active
if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark" \
  "set -g window-status-format '    #[fg=brightblack]#I #W'"
if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark" \
  "set -g window-status-current-format '    #[fg=cyan,bold]#I #[fg=brightwhite,bold]#W'"

# Pane borders
set -g pane-border-style "fg=black"
set -g pane-active-border-style "fg=cyan"
set -g display-panes-colour "black"
set -g display-panes-active-colour "cyan"

# Messages
set -g message-style "bg=black,fg=cyan"
set -g message-command-style "bg=black,fg=cyan"

# Clock
setw -g clock-mode-colour "cyan"

# Prefix highlight
set -g @prefix_highlight_fg "default"
set -g @prefix_highlight_bg "cyan"

# Cursor shape passthrough (default to bar cursor)
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[6 q'
set -ga terminal-overrides ',xterm-256color:Tc'
